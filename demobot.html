<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Based Bodyworks — AI Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff; border-radius: 20px;
    padding: 3rem 2.5rem; max-width: 480px;
    width: 100%; text-align: center;
    box-shadow: 0 4px 40px rgba(0,0,0,0.08);
  }
  .tag {
    display: inline-block; background: #f0ede8; color: #888;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.3rem 0.9rem;
    border-radius: 100px; margin-bottom: 1.5rem;
  }
  h1 { font-size: 1.6rem; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 0.8rem; }
  p { font-size: 0.9rem; color: #888; line-height: 1.8; margin-bottom: 2rem; }
  .arrow { display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #111; }
  .arrow svg { animation: bounce 1.5s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(5px);} }
  .built-by { margin-top: 2rem; font-size: 0.72rem; color: #bbb; }
  .built-by a { color: #888; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">Live Demo</div>
  <h1>Based Bodyworks AI Assistant</h1>
  <p>This bot is trained on Based Bodyworks products, routines and brand voice. Click the chat icon in the bottom right corner to talk to it.</p>
  <div class="arrow">
    Try it now
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 3v10M3 8l5 5 5-5" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="built-by">Built by <a href="mailto:ace.works19@gmail.com">aceworks.</a></div>
</div>
<script src="https://acechatbot-1.onrender.com/bot.js" data-client="basedbodyworks"></script>
</body>
</html>
